services:

  demo-supplier:
    container_name: explorviz-demo-supplier
    image: explorviz/demo-supplier
    ports:
      - ${SPAN_PORT}:8083
      - ${USER_PORT}:8084
      - ${CODE_PORT}:9999 # not used anymore

  kubediagrams:
    build:
      context: ..
      dockerfile: .dev/Dockerfile.kubediagrams-api
    container_name: kubediagrams-api
    volumes:
      - ..:/work
    working_dir: /work
    ports:
      - "9123:9123"
    command: ["node", "server/index.js"]


networks:
  default:
    name: explorviz
