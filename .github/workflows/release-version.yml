name: Release Docker Image

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to publish (e.g. v1.2.3)"
        required: true
        type: string
      ref:
        description: "Git ref to build (branch, tag, or commit SHA). Defaults to main."
        required: false
        type: string
        default: main

jobs:
  pnpm-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            .pnpm-store/
            node_modules/
          key: ${{ runner.os }}-pnpm-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-cache-
      - name: Install dependencies
        run: pnpm install

  build:
    runs-on: ubuntu-latest
    needs: [pnpm-install]
    env:
      VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            .pnpm-store/
            node_modules/
          key: ${{ runner.os }}-pnpm-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-cache-
      - name: Build production
        run: pnpm run build
      - name: Upload dist folder as artifact
        uses: actions/upload-artifact@v5
        with:
          name: prod-assets
          path: dist/
          retention-days: 3

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: prod-assets
          path: dist/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push multi-arch Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ${{ vars.DOCKER_IMAGE_NAME }}:$TAG_NAME . \
            --push
